name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Type-check + Lint
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings 0

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Unit tests
  # ──────────────────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_ci

      - name: Run unit tests
        run: npm test -- --reporter=verbose
        env:
          NODE_ENV: test
          JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-xxxxxxxxxx
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-xxxxxxxxx
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          WORKER_API_KEY: placeholder-worker-key-32-chars-minimum
          SYNC_WEBHOOK_SECRET: placeholder-webhook-secret-32-chars-xx

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Integration tests (real Postgres)
  # ──────────────────────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bullenhaus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test

      - name: Seed roles
        run: npx tsx prisma/seed-unified-roles.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_test
          JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-xxxxxxxxxx
          JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-xxxxxxxxx
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
          WORKER_API_KEY: placeholder-worker-key-32-chars-minimum
          SYNC_WEBHOOK_SECRET: placeholder-webhook-secret-32-chars-xx

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Build check
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bullenhaus_ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://api.bullenhaus.ailegal.dev
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
