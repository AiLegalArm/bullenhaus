name: Deploy — Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-production" to confirm'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  ENVIRONMENT: production

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 0. Safety gate — manual confirmation or tag-triggered
  # ──────────────────────────────────────────────────────────────────────────
  safety-gate:
    name: Safety Gate
    runs-on: ubuntu-latest
    steps:
      - name: Check manual confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-production" ]; then
            echo "❌ Confirmation string mismatch. Aborting."
            exit 1
          fi
          echo "✅ Production deploy confirmed."

      - name: Log trigger
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Ref:     ${{ github.ref }}"
          echo "SHA:     ${{ github.sha }}"
          echo "Actor:   ${{ github.actor }}"

  # ──────────────────────────────────────────────────────────────────────────
  # 1. Run full CI suite
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    needs: safety-gate
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Migrate production database
  # ──────────────────────────────────────────────────────────────────────────
  migrate-production:
    name: Migrate Production DB
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: production    # Requires manual approval in GitHub Environments
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      - name: Verify migration
        run: npm run db:verify
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend to Vercel (production)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel Production)
    runs-on: ubuntu-latest
    needs: migrate-production
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.PROD_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (production)
        run: |
          npx vercel deploy dist/ \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }} \
            --prod \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy backend + worker to Railway (production)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway Production)
    runs-on: ubuntu-latest
    needs: migrate-production
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: railway up --service=bullenhaus-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: production

      - name: Deploy Worker service
        run: railway up --service=bullenhaus-worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: production

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Smoke test production
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for services
        run: sleep 45

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          APP_URL: ${{ secrets.PROD_APP_URL }}
          API_URL: ${{ secrets.PROD_API_URL }}
          NODE_ENV: production

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Create GitHub Release
  # ──────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
