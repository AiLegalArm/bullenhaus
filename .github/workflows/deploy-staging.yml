name: Deploy — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for manual deploy
        required: false
        default: Manual trigger

concurrency:
  group: deploy-staging
  cancel-in-progress: false   # Never cancel a running deploy — wait for it

env:
  NODE_VERSION: '20'
  ENVIRONMENT: staging

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Run CI first
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Run database migrations on staging DB
  # ──────────────────────────────────────────────────────────────────────────
  migrate-staging:
    name: Migrate Staging DB
    runs-on: ubuntu-latest
    needs: ci-gate
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}

      - name: Apply RLS policies
        run: |
          npx tsx -e "
            import { execSync } from 'child_process';
            const url = process.env.STAGING_DIRECT_URL;
            execSync(
              \`psql \${url} -f supabase/migrations/003_rls_domain_isolation.sql\`,
              { stdio: 'inherit' }
            );
          " || echo "⚠️  RLS apply skipped (psql not available — run manually)"
        env:
          STAGING_DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
        continue-on-error: true

      - name: Verify migration
        run: npm run db:verify
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Deploy frontend to Vercel (staging)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel Staging)
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ secrets.STAGING_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel
        run: |
          npx vercel deploy dist/ \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --project=${{ secrets.VERCEL_PROJECT_ID }} \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # 4. Deploy backend / worker (Railway or Render)
  # ──────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway Staging)
    runs-on: ubuntu-latest
    needs: migrate-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: railway up --service=bullenhaus-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: staging

      - name: Deploy Worker service
        run: railway up --service=bullenhaus-worker --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: staging

  # ──────────────────────────────────────────────────────────────────────────
  # 5. Post-deploy smoke test
  # ──────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for services to stabilize
        run: sleep 30

      - name: Run smoke tests
        run: npm run test:smoke
        env:
          APP_URL: ${{ secrets.STAGING_APP_URL }}
          API_URL: ${{ secrets.STAGING_API_URL }}
          NODE_ENV: staging

      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️  Staging smoke test failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          # Add Slack/email notification here if needed
